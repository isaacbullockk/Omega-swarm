services:
  - type: web
    name: omega-swarm
    runtime: node
    repo: https://github.com/isaacbullockk/Omega-swarm.git
    branch: main
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npx tsx server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: OPENAI_API_KEY
        sync: false
      - key: BUFFER_API_KEY
        sync: false
    healthCheckPath: /api/health
    plan: free
